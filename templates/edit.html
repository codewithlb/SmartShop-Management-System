<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Edit Product</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-5">

        <h2 class="mb-4">
            Edit Product
        </h2>

        <form method="POST">

            <!-- Product Name -->
            <div class="mb-3">

                <label class="form-label">
                    Product Name
                </label>

                <input type="text"
                name="name"
                value="{{ product[1] }}"
                class="form-control">

            </div>

            <!-- Category -->
            <div class="mb-3">

                <label class="form-label">
                    Category
                </label>

                <input type="text"
                name="category"
                value="{{ product[2] }}"
                class="form-control">

            </div>

            <!-- Quantity -->
            <div class="mb-3">

                <label class="form-label">
                    Quantity
                </label>

                <input type="number"
                name="quantity"
                value="{{ product[3] }}"
                class="form-control">

            </div>

            <!-- Price -->
            <div class="mb-4">

                <label class="form-label">
                    Price
                </label>

                <input type="number"
                name="price"
                value="{{ product[4] }}"
                class="form-control">

            </div>

            <button type="submit"
            class="btn btn-warning">

            Update Product

            </button>

        </form>

    </div>

</div>

</body>

</html>
