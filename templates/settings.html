<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

    <div class="container py-5">

        <!-- Heading -->
        <div class="mb-5">

            <h1 class="fw-bold">
                Settings ⚙️
            </h1>

            <p class="text-muted">
                Manage your shop preferences
            </p>

        </div>

        <div class="row g-4">

            <!-- Shop Info -->
            <div class="col-lg-6">

                <div class="card shadow border-0 rounded-4 p-4">

                    <h3 class="fw-bold mb-4">
                        Shop Information
                    </h3>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Shop Name
                            </label>

                            <input type="text" name="shop_name" class="form-control form-control-lg"
                                placeholder="Enter shop name">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Owner Name
                            </label>

                            <input type="text" name="owner_name" class="form-control form-control-lg"
                                placeholder="Enter owner name">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input type="text" name="phone" class="form-control form-control-lg"
                                placeholder="Enter phone number">

                        </div>

                        <button class="btn btn-warning w-100 fw-bold py-3">
                            Save Changes
                        </button>

                    </form>

                </div>

            </div>

            <!-- System Settings -->
            <div class="col-lg-6">

                <div class="card shadow border-0 rounded-4 p-4">

                    <h3 class="fw-bold mb-4">
                        System Preferences
                    </h3>

                    <!-- Dark Mode -->
                    <div class="form-check form-switch mb-4">

                        <input class="form-check-input" type="checkbox" name="dark_mode">

                        <label class="form-check-label">
                            Enable Dark Mode
                        </label>

                    </div>

                    <!-- Notifications -->
                    <div class="form-check form-switch mb-4">

                        <input class="form-check-input" type="checkbox" name="notifications" checked>

                        <label class="form-check-label">
                            Sales Notifications
                        </label>

                    </div>

                    <!-- Currency -->
                    <div class="mb-4">

                        <label class="form-label">
                            Currency
                        </label>

                        <select class="form-select" name="currency">

                            <option value="INR">INR ₹</option>
                            <option value="USD">USD $</option>
                            <option value="EUR">EUR €</option>

                        </select>

                    </div>

                   

                </div>

            </div>

        </div>

    </div>

</body>

</html>
