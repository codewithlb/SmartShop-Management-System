<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CSS -->
   <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

   
    <title>Document</title>
</head>
<body>
    <!-- Main Content -->
<div class="container-fluid p-5 bg-light min-vh-100">

    <!-- Heading -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h1 class="fw-bold">
                Add Product
            </h1>

            <p class="text-muted">
                Manage your shop inventory easily
            </p>
        </div>

        <button class="btn btn-dark px-4 py-2 rounded-3",href="/Vproducts">
            View Products
        </button>

    </div>

    <!-- Form Card -->
    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- Top Banner -->
                <div class="bg-dark p-4">

                    <h2 class="text-warning fw-bold mb-1">
                        SmartShop Inventory
                    </h2>

                    <p class="text-light m-0">
                        Add new products to your store
                    </p>

                </div>

                <!-- Form -->
                <div class="card-body p-5">

                    <form method="POST">

                        <!-- Row -->
                        <div class="row">

                            <!-- Product Name -->
                            <div class="col-md-6 mb-4">

                                <label class="form-label fw-semibold">
                                    Product Name
                                </label>

                                <input type="text"
                                    name="name"
                                    class="form-control form-control-lg rounded-3"
                                    placeholder="Enter product name">

                            </div>

                            <!-- Category -->
                            <div class="col-md-6 mb-4">

                                <label class="form-label fw-semibold">
                                    Category
                                </label>

                                <select name="category"
                                    class="form-select form-select-lg rounded-3">

                                    <option>Electronics</option>
                                    <option>Groceries</option>
                                    <option>Clothing</option>
                                    <option>Stationery</option>

                                </select>

                            </div>

                        </div>

                        <!-- Second Row -->
                        <div class="row">

                            <!-- Quantity -->
                            <div class="col-md-6 mb-4">

                                <label class="form-label fw-semibold">
                                    Quantity
                                </label>

                                <input type="number"
                                    name="quantity"
                                    class="form-control form-control-lg rounded-3"
                                    placeholder="Enter quantity">

                            </div>

                            <!-- Price -->
                            <div class="col-md-6 mb-4">

                                <label class="form-label fw-semibold">
                                    Price
                                </label>

                                <input type="number"
                                    name="price"
                                    class="form-control form-control-lg rounded-3"
                                    placeholder="Enter product price">

                            </div>

                        </div>

                        <!-- Description -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Product Description
                            </label>

                            <textarea
                                class="form-control rounded-3"
                                rows="4"
                                placeholder="Write product details..."></textarea>

                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-3">

                            <button type="submit"
                                class="btn btn-warning flex-fill py-3 fw-bold rounded-3">

                                + Add Product

                            </button>

                            <button type="reset"
                                class="btn btn-outline-dark flex-fill py-3 fw-bold rounded-3">

                                Reset

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
</body>
</html>
