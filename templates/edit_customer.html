<!DOCTYPE html>
<html>
<head>
    <title>Edit Customer</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body class="container py-5">

    <h2>Edit Customer</h2>

    <form method="POST">

        <input type="text"
            name="name"
            value="{{ customer[1] }}"
            class="form-control mb-3">

        <input type="text"
            name="phone"
            value="{{ customer[2] }}"
            class="form-control mb-3">

        <input type="email"
            name="email"
            value="{{ customer[3] }}"
            class="form-control mb-3">

        <input type="number"
            name="total_purchase"
            value="{{ customer[4] }}"
            class="form-control mb-3">

        <select name="status"
            class="form-control mb-3">

            <option value="Active"
            {% if customer[5] == "Active" %}
            selected
            {% endif %}>
                Active
            </option>

            <option value="Returning"
            {% if customer[5] == "Returning" %}
            selected
            {% endif %}>
                Returning
            </option>

        </select>

        <button class="btn btn-primary">
            Update Customer
        </button>

    </form>

</body>
</html>
